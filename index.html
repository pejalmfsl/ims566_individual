<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Management Dashboard - Login</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Small custom CSS for UiTM colours only */
    .bg-uitm {
      background-color: #4b0082;
    }

    .text-uitm {
      color: #4b0082;
    }

    .border-uitm-gold {
      border-color: #f6c343 !important;
    }

    .btn-uitm {
      background-color: #4b0082;
      border-color: #4b0082;
      color: #ffffff;
    }

    .btn-uitm:hover {
      background-color: #2f0052;
      border-color: #2f0052;
      color: #ffffff;
    }

    .logo-img {
      width: 130px;
      height: 130px;
      object-fit: contain;
    }
  </style>
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center p-3">
  <main class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
        <section class="card shadow border-0 rounded-3 overflow-hidden">
          <div class="card-header bg-uitm text-white text-center border-bottom border-5 border-uitm-gold p-4">
            <div class="bg-white border border-4 border-uitm-gold rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center" style="width: 150px; height: 150px;">
              <!-- Put the UiTM logo at assets/images/LogoUiTM.png -->
              <img src="assets/images/LogoUiTM.png" alt="UiTM Logo" class="logo-img" onerror="this.style.display='none'; document.getElementById('logoPlaceholder').classList.remove('d-none');">
              <span id="logoPlaceholder" class="text-uitm fw-bold small text-center d-none">UiTM<br>Logo</span>
            </div>

            <h1 class="h4 fw-bold mb-1">Library Management Dashboard</h1>
            <p class="small mb-0">Please login to continue</p>
          </div>

          <div class="card-body p-4">
            <!-- Bootstrap alert for login status -->
            <div id="loginAlert" class="alert d-none" role="alert"></div>

            <form id="loginForm">
              <div class="mb-3">
                <label for="username" class="form-label fw-semibold text-uitm">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username" required>
              </div>

              <div class="mb-3">
                <label for="password" class="form-label fw-semibold text-uitm">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password" required>
              </div>

              <button type="submit" class="btn btn-uitm w-100 py-2 fw-semibold">Login</button>
            </form>

            <p class="text-secondary small text-center mt-3 mb-0">Demo account: admin / 123456</p>
          </div>
        </section>
      </div>
    </div>
  </main>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Demo login credentials.
    const validUsername = 'admin';
    const validPassword = '123456';

    // Main page elements.
    const loginForm = document.getElementById('loginForm');
    const loginAlert = document.getElementById('loginAlert');

    // Show a Bootstrap alert message.
    function showAlert(type, message) {
      loginAlert.className = `alert alert-${type}`;
      loginAlert.textContent = message;
    }

    // Validate the login form using hardcoded credentials.
    loginForm.addEventListener('submit', function (event) {
      event.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (username === validUsername && password === validPassword) {
        showAlert('success', 'Login successful. Welcome to the dashboard.');
      } else {
        showAlert('danger', 'Invalid username or password. Please try again.');
      }
    });
  </script>
</body>
</html>
